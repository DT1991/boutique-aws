# Test environment overrides
global:
  environment: test
  tag: test-latest

services:
  frontend:
    replicas: 1
    hpa:
      enabled: false
  cartservice:
    replicas: 1
  loadgenerator:
    enabled: true
    env:
      USERS: "10"

ingress:
  host: "test.online-boutique.boutique-team.com"
  certArn: "PLACEHOLDER_TEST_CERT_ARN"
  albLogsBucket: "online-boutique-test-alb-logs"

externalSecrets:
  enabled: false
  redisSecretPath: "online-boutique-test/redis/auth-token"
