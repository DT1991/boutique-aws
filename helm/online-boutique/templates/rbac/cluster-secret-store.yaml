{{- if .Values.externalSecrets.enabled }}
---
# ClusterSecretStore: connects to AWS Secrets Manager
#
# Prerequisites: External Secrets Operator must be installed with the IRSA role ARN injected at install time:
#
#   ESO_ROLE=$(terraform -chdir=terraform/environments/<env> output -raw external_secrets_role_arn)
#
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$ESO_ROLE
#
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.externalSecrets.clusterSecretStoreName }}
  labels:
    {{- include "online-boutique.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region | default "ap-northeast-1" }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
{{- end }}
