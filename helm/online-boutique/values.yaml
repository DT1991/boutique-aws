# =============================================================================
# Online Boutique — Default Values
# All environments inherit this file; use values-<env>.yaml to override environment-specific values.
# =============================================================================

global:
  # ECR registry; injected at pipeline runtime via --set global.registry=...
  registry: "ACCOUNT_ID.dkr.ecr.ap-northeast-1.amazonaws.com/online-boutique"
  # Image tag; injected at pipeline runtime via --set global.tag=sha-xxxxxxx
  tag: "latest"
  imagePullPolicy: Always
  environment: "dev"

  # Security context shared by all pods
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

  # Topology spread constraints (spread pods across availability zones where possible)
  topologySpreadEnabled: true

  # Toggle for the default-deny NetworkPolicy
  networkPolicyEnabled: true

# =============================================================================
# Per-service configuration
# =============================================================================
services:

  frontend:
    enabled: true
    image: frontend
    replicas: 2
    port: 8080
    servicePort: 80
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 60
    env:
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"
      RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
      AD_SERVICE_ADDR: "adservice:9555"
      ENV_PLATFORM: "aws"
      ENABLE_PROFILER: "0"
    livenessProbe:
      httpGet:
        path: /_healthz
        port: 8080
        httpHeaders:
          - name: Cookie
            value: shop_session-id=x-liveness-probe
      initialDelaySeconds: 15
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /_healthz
        port: 8080
        httpHeaders:
          - name: Cookie
            value: shop_session-id=x-readiness-probe
      initialDelaySeconds: 10
      periodSeconds: 5

  cartservice:
    enabled: true
    image: cartservice
    replicas: 2
    port: 7070
    protocol: grpc
    resources:
      requests:
        cpu: 200m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 128Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 60
    # Redis connection details are injected via ExternalSecret — not hardcoded here
    redis:
      secretName: "redis-credentials"
      hostKey: "host_port"
      passwordKey: "auth_token"
      tlsEnabled: "true"
    livenessProbe:
      grpc:
        port: 7070
      initialDelaySeconds: 15
      periodSeconds: 10
    readinessProbe:
      grpc:
        port: 7070
      initialDelaySeconds: 15
      periodSeconds: 5

  productcatalogservice:
    enabled: true
    image: productcatalogservice
    replicas: 2
    port: 3550
    protocol: grpc
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 60

  currencyservice:
    enabled: true
    image: currencyservice
    replicas: 2
    port: 7000
    protocol: grpc
    # currencyservice handles the highest QPS, so it receives more generous resource allocations
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 15
      targetCPUUtilizationPercentage: 60

  paymentservice:
    enabled: true
    image: paymentservice
    replicas: 2
    port: 50051
    protocol: grpc
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: false

  shippingservice:
    enabled: true
    image: shippingservice
    replicas: 2
    port: 50051
    protocol: grpc
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: false

  emailservice:
    enabled: true
    image: emailservice
    replicas: 1
    port: 8080
    protocol: grpc
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: false

  checkoutservice:
    enabled: true
    image: checkoutservice
    replicas: 2
    port: 5050
    protocol: grpc
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 60
    env:
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      PAYMENT_SERVICE_ADDR: "paymentservice:50051"
      EMAIL_SERVICE_ADDR: "emailservice:8080"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"

  recommendationservice:
    enabled: true
    image: recommendationservice
    replicas: 2
    port: 8080
    protocol: grpc
    resources:
      requests:
        cpu: 100m
        memory: 220Mi
      limits:
        cpu: 200m
        memory: 450Mi
    hpa:
      enabled: false
    env:
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"

  adservice:
    enabled: true
    image: adservice
    replicas: 2
    port: 9555
    protocol: grpc
    resources:
      requests:
        cpu: 200m
        memory: 180Mi
      limits:
        cpu: 300m
        memory: 300Mi
    hpa:
      enabled: false

  loadgenerator:
    # Disabled in prod/staging; enabled in dev/test/perf
    enabled: false
    image: loadgenerator
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      FRONTEND_ADDR: "frontend:80"
      USERS: "10"

# =============================================================================
# Ingress (ALB)
# =============================================================================
ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type":"redirect","RedirectConfig":{"Protocol":"HTTPS","Port":"443","StatusCode":"HTTP_301"}}'
    alb.ingress.kubernetes.io/healthcheck-path: /_healthz
  # Overridden per environment in the corresponding values file
  host: "PLACEHOLDER.boutique-team.com"
  certArn: "PLACEHOLDER_ACM_CERT_ARN"
  albLogsBucket: "PLACEHOLDER_LOG_BUCKET"

# =============================================================================
# External Secrets (AWS Secrets Manager -> K8s Secret)
# =============================================================================
externalSecrets:
  enabled: true
  clusterSecretStoreName: "aws-secretsmanager"
  region: "ap-northeast-1"
  refreshInterval: "1h"
  redisSecretPath: ""
  # IAM role ARN for External Secrets Operator — from Terraform output:
  #   terraform output external_secrets_role_arn
  roleArn: ""

# =============================================================================
# RBAC / IRSA (IAM Roles for Service Accounts)
# Overridden per environment via --set or values-<env>.yaml
# =============================================================================
rbac:
  # If a service needs direct access to AWS resources, set its IRSA role ARN here.
  # cartservice reads Redis credentials via External Secrets Operator and does not need its own IRSA role.
  cartserviceRoleArn: ""

# =============================================================================
# cert-manager
# =============================================================================
certManager:
  enabled: true
  email: "platform@boutique-team.com"
  issuer: "letsencrypt-prod"

# =============================================================================
# Monitoring (ServiceMonitor + PrometheusRule)
# =============================================================================
monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
  alerts:
    errorRateThreshold: "0.05"
    latencyP99Threshold: "2"
