###############################################################################
# Online Boutique — Infrastructure Pipeline
# Terraform plan/apply for all 5 environments
###############################################################################

name: Infrastructure Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [dev, test, perf, staging, prod]
      action:
        description: "Action"
        required: true
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION: ap-northeast-1
  TF_VERSION: 1.10.0
  TF_IN_AUTOMATION: "true"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  ###########################################################################
  # Stage 1: Validate & Security Scan
  ###########################################################################
  validate:
    name: "Stage 1: Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: |
          terraform fmt -recursive -check terraform/
          if [ $? -ne 0 ]; then
            echo "::error::Run: terraform fmt -recursive terraform/"
            exit 1
          fi

      - name: tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --init
          find terraform -name "*.tf" -exec dirname {} \; | sort -u | while read dir; do
            tflint --chdir="$dir" || exit 1
          done

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_144
        continue-on-error: true

  ###########################################################################
  # Stage 2: Plan (all environments in parallel)
  ###########################################################################
  plan:
    name: "Stage 2: Plan (${{ matrix.env }})"
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: dev
            bucket: online-boutique-tfstate-nonprod
            role_secret: AWS_ROLE_ARN_DEV
          - env: test
            bucket: online-boutique-tfstate-nonprod
            role_secret: AWS_ROLE_ARN_TEST
          - env: perf
            bucket: online-boutique-tfstate-nonprod
            role_secret: AWS_ROLE_ARN_PERF
          - env: staging
            bucket: online-boutique-tfstate-prod
            role_secret: AWS_ROLE_ARN_STAGING
          - env: prod
            bucket: online-boutique-tfstate-prod
            role_secret: AWS_ROLE_ARN_PROD
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[matrix.role_secret] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform/environments/${{ matrix.env }}
        run: |
          terraform init \
            -backend-config="bucket=${{ matrix.bucket }}" \
            -backend-config="key=${{ matrix.env }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform plan
        id: plan
        working-directory: terraform/environments/${{ matrix.env }}
        run: |
          terraform plan \
            -out=tfplan.binary \
            -detailed-exitcode \
            -lock-timeout=60s \
            2>&1 | tee plan.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          terraform show -json tfplan.binary > tfplan.json

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.env }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated)' : plan;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ matrix.env }}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: |
            terraform/environments/${{ matrix.env }}/tfplan.binary
            terraform/environments/${{ matrix.env }}/tfplan.json
          retention-days: 5

  ###########################################################################
  # Stage 3: Apply Dev (triggered automatically after merge to main)
  ###########################################################################
  apply-dev:
    name: "Stage 3: Apply dev"
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: infra-dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: terraform/environments/dev/
      - name: Terraform init & apply
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=online-boutique-tfstate-nonprod" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve -lock-timeout=120s tfplan.binary

  ###########################################################################
  # Stage 4: Apply Test
  ###########################################################################
  apply-test:
    name: "Stage 4: Apply test"
    runs-on: ubuntu-latest
    needs: apply-dev
    environment:
      name: infra-test
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-test
          path: terraform/environments/test/
      - working-directory: terraform/environments/test
        run: |
          terraform init \
            -backend-config="bucket=online-boutique-tfstate-nonprod" \
            -backend-config="key=test/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve -lock-timeout=120s tfplan.binary

  ###########################################################################
  # Stage 5: Apply Perf
  ###########################################################################
  apply-perf:
    name: "Stage 5: Apply perf"
    runs-on: ubuntu-latest
    needs: apply-test
    environment:
      name: infra-perf
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PERF }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-perf
          path: terraform/environments/perf/
      - working-directory: terraform/environments/perf
        run: |
          terraform init \
            -backend-config="bucket=online-boutique-tfstate-nonprod" \
            -backend-config="key=perf/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve -lock-timeout=300s tfplan.binary

  ###########################################################################
  # Stage 6: Apply Staging (requires approval)
  ###########################################################################
  apply-staging:
    name: "Stage 6: Apply staging"
    runs-on: ubuntu-latest
    needs: apply-perf
    environment:
      name: infra-staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: terraform/environments/staging/
      - working-directory: terraform/environments/staging
        run: |
          terraform init \
            -backend-config="bucket=online-boutique-tfstate-prod" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve -lock-timeout=300s tfplan.binary

  ###########################################################################
  # Stage 7: Apply Prod (requires approval)
  ###########################################################################
  apply-prod:
    name: "Stage 7: Apply prod"
    runs-on: ubuntu-latest
    needs: apply-staging
    environment:
      name: infra-prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: terraform/environments/prod/
      - working-directory: terraform/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=online-boutique-tfstate-prod" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve -lock-timeout=600s tfplan.binary

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: "#infra-changes"
          slack-message: |
            ${{ job.status == 'success' && 'Infra apply prod — success' || 'Infra apply prod — FAILED' }}
            By: ${{ github.actor }}  Commit: `${{ github.sha }}`
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
